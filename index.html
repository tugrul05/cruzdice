*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--s:#00cfff;--sg:rgba(0,207,255,0.55);--sp:rgba(0,207,255,0.22);--sd:rgba(0,207,255,0.12);--bgc:#000}
body{background:#000;font-family:'Orbitron',monospace;overflow-x:hidden;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
.cr-bg{min-height:100vh;transition:background .5s;position:relative;overflow:hidden}
.cr-scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:1}
.cr-grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.07}
.cr-inner{position:relative;z-index:2;max-width:860px;margin:0 auto;padding:26px 18px 38px;display:flex;flex-direction:column;align-items:center;gap:18px}
.cr-logo{font-size:clamp(1.8rem,6vw,3.4rem);font-weight:900;letter-spacing:.18em;color:var(--s);text-shadow:0 0 8px var(--s),0 0 28px var(--sg);text-align:center;line-height:1}
.cr-logo span{color:#fff;text-shadow:0 0 8px #fff,0 0 24px var(--s)}
.cr-hline{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--s),transparent);box-shadow:0 0 6px var(--s)}
.cr-topbar{width:100%;display:flex;gap:8px;justify-content:flex-end;align-items:center}
.cr-online{display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:.52rem;letter-spacing:.22em;color:var(--s);opacity:.75}
.cr-online-dot{width:8px;height:8px;border-radius:50%;background:#00ff87;box-shadow:0 0 6px #00ff87,0 0 12px #00ff87;animation:opulse 2s ease-in-out infinite;flex-shrink:0}
.cr-online-dot.offline{background:#555;box-shadow:none;animation:none}
@keyframes opulse{0%,100%{opacity:1;box-shadow:0 0 6px #00ff87,0 0 12px #00ff87}50%{opacity:.4;box-shadow:0 0 2px #00ff87}}
.cr-tbtn{padding:7px 14px;border:1px solid var(--s);background:transparent;color:var(--s);font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.2em;cursor:pointer;border-radius:3px;transition:all .2s;box-shadow:0 0 5px var(--sp)}
.cr-tbtn:hover{box-shadow:0 0 14px var(--s);background:rgba(0,0,0,.2)}
.cr-tbtn.on{background:rgba(255,255,255,.06);box-shadow:0 0 14px var(--s),inset 0 0 8px var(--sd)}
.cr-panel{width:100%;border:1px solid var(--s);border-radius:4px;padding:16px 18px 18px;background:transparent;box-shadow:0 0 14px var(--sp),inset 0 0 14px var(--sd)}
.cr-plbl{font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.38em;color:var(--s);opacity:.42;text-align:center;margin-bottom:10px}
.cr-crow{display:flex;justify-content:center;gap:7px;margin-bottom:16px}
.cr-cbtn{width:40px;height:40px;border:1px solid var(--s);background:transparent;color:var(--s);font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;cursor:pointer;border-radius:3px;transition:all .18s;box-shadow:0 0 5px var(--sp)}
.cr-cbtn:hover{box-shadow:0 0 12px var(--s);transform:translateY(-2px)}
.cr-cbtn.active{box-shadow:0 0 12px var(--s),0 0 26px var(--sg),inset 0 0 8px var(--sd);text-shadow:0 0 8px var(--s);background:rgba(0,207,255,.08)}
.cr-clrow{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.cr-ctog{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:default;pointer-events:none}
.cr-ctog input{display:none}
.cr-sw{width:42px;height:42px;border-radius:7px;border:2px solid var(--c);background:transparent;position:relative;transition:all .18s;box-shadow:0 0 7px var(--c)}
.cr-sw::before{content:'';position:absolute;inset:5px;border-radius:4px;background:var(--c);opacity:.2;transition:opacity .18s}
.cr-ctog input:checked ~ .cr-sw{box-shadow:0 0 14px var(--c),0 0 28px color-mix(in srgb,var(--c) 40%,transparent),inset 0 0 8px color-mix(in srgb,var(--c) 20%,transparent)}
.cr-ctog input:checked ~ .cr-sw::before{opacity:.34}
.cr-ctog input:not(:checked) ~ .cr-sw{opacity:.2;box-shadow:none}
.cr-cn{font-family:'Share Tech Mono',monospace;font-size:.42rem;letter-spacing:.14em;color:var(--c);opacity:.7}
.cr-ctog input:not(:checked) ~ .cr-cn{opacity:.18}
.cr-roll{display:block;width:100%;padding:15px 0;border:2px solid var(--s);background:transparent;color:var(--s);font-family:'Orbitron',monospace;font-size:1.15rem;font-weight:900;letter-spacing:.5em;cursor:pointer;border-radius:3px;transition:all .2s;box-shadow:0 0 14px var(--sp),inset 0 0 10px var(--sd);text-shadow:0 0 10px var(--s)}
.cr-roll:hover{box-shadow:0 0 26px var(--s),0 0 55px var(--sg),inset 0 0 16px var(--sd);transform:translateY(-2px);letter-spacing:.6em}
.cr-roll:active{transform:scale(.97)}
.cr-roll.rolling{animation:crpulse .5s ease-out}
@keyframes crpulse{0%{box-shadow:0 0 14px var(--sp)}50%{box-shadow:0 0 55px var(--s),0 0 110px var(--sg)}100%{box-shadow:0 0 14px var(--sp)}}
.cr-rbar{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.22em;color:var(--s);opacity:.45;text-align:center;min-height:1em}
.cr-rbar strong{opacity:1;text-shadow:0 0 6px var(--s)}
.cr-area{width:100%;min-height:150px;border:1px solid var(--s);border-radius:4px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:20px;padding:28px 16px 32px;position:relative;box-shadow:0 0 12px var(--sp),inset 0 0 16px var(--sd)}
.cr-area::before{content:'DICE OUTPUT';position:absolute;top:-9px;left:16px;padding:0 7px;font-family:'Share Tech Mono',monospace;font-size:.46rem;letter-spacing:.28em;color:var(--s);opacity:.38;background:var(--bgc)}
.cr-empty{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.26em;color:var(--s);opacity:.18}
.cr-dw{display:flex;flex-direction:column;align-items:center;gap:6px}
.cr-die{width:78px;height:78px;border-width:2px;border-style:solid;border-radius:12px;position:relative;background:rgba(0,0,0,.35)}
.cr-die::before,.cr-die::after{content:'';position:absolute;width:9px;height:9px;border-style:solid;border-color:inherit;opacity:.5}
.cr-die::before{top:4px;left:4px;border-width:1px 0 0 1px}
.cr-die::after{bottom:4px;right:4px;border-width:0 1px 1px 0}
.cr-die.anim{animation:droll .5s cubic-bezier(.36,.07,.19,.97) both}
@keyframes droll{0%{transform:rotate(0) scale(1)}15%{transform:rotate(-18deg) scale(1.12) translateX(-5px)}32%{transform:rotate(22deg) scale(1.08) translateX(5px)}48%{transform:rotate(-11deg) scale(1.04)}64%{transform:rotate(7deg) scale(1.02)}80%{transform:rotate(-3deg)}100%{transform:rotate(0) scale(1)}}
.cr-dtag{font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.18em;opacity:.75;text-transform:uppercase}
.cr-warn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);border:1px solid #ff003c;color:#ff003c;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.2em;padding:7px 16px;background:#000;z-index:99;animation:crwarn 2.3s forwards;pointer-events:none;white-space:nowrap;box-shadow:0 0 12px rgba(255,0,60,.35)}
@keyframes crwarn{0%{opacity:0;transform:translateX(-50%) translateY(8px)}12%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.cr-footer{font-family:'Share Tech Mono',monospace;font-size:.46rem;letter-spacing:.35em;color:var(--s);opacity:.16;text-align:center}
.cr-settings{width:100%;border:1px solid var(--s);border-radius:4px;background:transparent;box-shadow:0 0 14px var(--sp),inset 0 0 14px var(--sd)}
.cr-s-head{font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.38em;color:var(--s);opacity:.42;text-align:center;padding:12px 0 10px}
.cr-s-section{padding:0 18px 16px}
.cr-s-lbl{font-family:'Share Tech Mono',monospace;font-size:.48rem;letter-spacing:.28em;color:var(--s);opacity:.38;margin-bottom:10px}
.cr-themes{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:560px){.cr-themes{grid-template-columns:repeat(2,1fr)}}
.cr-theme-card{border:1px solid transparent;border-radius:5px;cursor:pointer;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;transition:all .22s;position:relative;overflow:hidden}
.cr-theme-card:hover{transform:translateY(-2px)}
.cr-theme-card.sel{border-color:var(--s) !important;box-shadow:0 0 12px var(--sp)}
.cr-theme-card.sel::after{content:'';position:absolute;top:8px;right:8px;width:7px;height:12px;border-right:2px solid var(--s);border-bottom:2px solid var(--s);transform:rotate(45deg);opacity:.9;box-shadow:1px 1px 4px var(--sg)}
.cr-tc-preview{width:100%;height:40px;border-radius:4px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.cr-tc-grid{position:absolute;inset:0;background-size:16px 16px}
.cr-tc-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:2px;border-radius:2px}
.cr-tc-name{font-family:'Share Tech Mono',monospace;font-size:.42rem;letter-spacing:.15em;opacity:.8}
@media(max-width:500px){.cr-die{width:66px;height:66px}.cr-roll{font-size:.95rem;padding:13px 0}.cr-cbtn{width:36px;height:36px}.cr-sw{width:38px;height:38px}}

  10% {opacity:.9}
  85% {opacity:.75}
  100%{transform:translateY(-100px) rotate(360deg) scale(1.2);opacity:0}
}

  8%  {opacity:1}
  88% {opacity:.8}
  100%{transform:translateY(-80px) rotate(359deg);opacity:0}
}

  5%   { opacity:1 }
  50%  { transform:translateY(-45vh) rotate(180deg) scale(1.1); opacity:.9 }
  95%  { opacity:.7 }
  100% { transform:translateY(-105vh) rotate(360deg) scale(.8); opacity:0  }
}

  6%  {opacity:1}
  88% {opacity:.9}
  100%{transform:translateY(-105vh);opacity:0}
}

/* ── ANIMATED THEME EFFECTS ── */
#fx-layer{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden;display:none}

/* STARS */
.star{position:absolute;border-radius:50%;background:#fff;animation:starTwinkle ease-in-out infinite}
@keyframes starTwinkle{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.2;transform:scale(.4)}}
.star-shoot{position:absolute;height:2px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff);border-radius:2px;animation:shoot linear forwards}
@keyframes shoot{0%{transform:translateX(0) translateY(0);opacity:1;width:0px}100%{transform:translateX(280px) translateY(280px);opacity:0;width:160px}}

/* RAIN */
.raindrop{position:absolute;width:1.5px;background:linear-gradient(180deg,rgba(72,202,228,0),rgba(72,202,228,.7));border-radius:2px;animation:rainFall linear infinite}
@keyframes rainFall{0%{transform:translateY(-60px);opacity:0}8%{opacity:1}90%{opacity:.7}100%{transform:translateY(110vh);opacity:0}}


/* AURORA */
.aurora-band{position:absolute;left:-20%;width:140%;border-radius:50%;filter:blur(38px);animation:auroraSway ease-in-out infinite}
@keyframes auroraSway{0%,100%{transform:translateX(0) scaleY(1);opacity:.28}33%{transform:translateX(6%) scaleY(1.18);opacity:.42}66%{transform:translateX(-5%) scaleY(.88);opacity:.22}}


/* GLITCH scanlines + flicker */
.glitch-line{position:absolute;left:0;width:100%;background:rgba(0,255,65,.08);animation:glitchScan linear infinite}
@keyframes glitchScan{0%{top:-4px;opacity:0}5%{opacity:1}95%{opacity:.6}100%{top:110%;opacity:0}}
.glitch-block{position:absolute;background:rgba(0,255,65,.12);animation:glitchFlick steps(1) infinite}
@keyframes glitchFlick{0%,100%{opacity:0}50%{opacity:1}}

/* DEEP bubbles */
.bubble{position:absolute;border-radius:50%;border:1px solid rgba(0,102,255,.4);background:rgba(0,102,255,.06);animation:bubbleRise ease-in infinite}
@keyframes bubbleRise{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.8}90%{opacity:.5}100%{transform:translateY(-110vh) scale(1.4);opacity:0}}

/* PLASMA waves */
.plasma-wave{position:absolute;left:-10%;width:120%;border-radius:50%;filter:blur(30px);animation:plasmaFloat ease-in-out infinite}
@keyframes plasmaFloat{0%,100%{transform:translateY(0) scaleX(1);opacity:.25}50%{transform:translateY(-30px) scaleX(1.06);opacity:.45}}

/* NEON city lights */
.neon-bar{position:absolute;border-radius:2px;filter:blur(3px);animation:neonFlicker ease-in-out infinite}
@keyframes neonFlicker{0%,100%{opacity:.9}25%{opacity:.4}50%{opacity:1}75%{opacity:.2}}
.neon-reflect{position:absolute;bottom:0;left:0;right:0;height:35%;background:linear-gradient(0deg,rgba(255,0,255,.08),transparent);pointer-events:none}

/* ICE crystals */
.ice-crystal{position:absolute;animation:iceDrift linear infinite}
@keyframes iceDrift{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:.7}90%{opacity:.5}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.ice-crystal::before,.ice-crystal::after{content:'';position:absolute;background:rgba(168,237,255,.6);border-radius:1px}
.ice-crystal::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
.ice-crystal::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
</style>
</head>
<body>

<div class="cr-bg" id="crBg">
  <div class="cr-scan"></div>
  <div class="cr-grid-bg" id="crGridBg"></div>
  <div id="fx-layer"></div>
  <div class="cr-inner">

    <div class="cr-topbar">
      <button class="cr-tbtn" id="btnWheel" title="Toggle Wheel / Dice" style="margin-right:auto;display:flex;align-items:center;gap:6px">
        <svg id="iconWheel" width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="var(--s)" stroke-width="1.8"/><circle cx="12" cy="12" r="1.6" fill="var(--s)"/><line x1="12" y1="3" x2="12" y2="12" stroke="var(--s)" stroke-width="1.8"/><line x1="12" y1="12" x2="18.5" y2="8.2" stroke="var(--s)" stroke-width="1.8"/><line x1="12" y1="12" x2="18.5" y2="15.8" stroke="var(--s)" stroke-width="1.8"/><line x1="12" y1="12" x2="12" y2="21" stroke="var(--s)" stroke-width="1.8"/><line x1="12" y1="12" x2="5.5" y2="15.8" stroke="var(--s)" stroke-width="1.8"/><line x1="12" y1="12" x2="5.5" y2="8.2" stroke="var(--s)" stroke-width="1.8"/></svg>
        <svg id="iconDice" width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="var(--s)" stroke-width="1.8"/><circle cx="8" cy="8" r="1.4" fill="var(--s)"/><circle cx="16" cy="8" r="1.4" fill="var(--s)"/><circle cx="8" cy="16" r="1.4" fill="var(--s)"/><circle cx="16" cy="16" r="1.4" fill="var(--s)"/><circle cx="12" cy="12" r="1.4" fill="var(--s)"/></svg>

      <a href="https://discord.gg/rexplace" target="_blank" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--s);border-radius:3px;box-shadow:0 0 5px var(--sp);text-decoration:none;transition:all .2s;flex-shrink:0" onmouseover="this.style.boxShadow='0 0 14px var(--s)'" onmouseout="this.style.boxShadow='0 0 5px var(--sp)'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.031.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" fill="var(--s)"/>

<script>
// ── Disable right-click & copy ──
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('copy',        e => e.preventDefault());
document.addEventListener('cut',         e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());

// ── Disable DevTools shortcuts ──
document.addEventListener('keydown', e => {
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].includes(e.key)) ||
    (e.ctrlKey && ['U','u','S','s'].includes(e.key))
  ) { e.preventDefault(); return false; }
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    const wheelVisible = document.getElementById('wheelScreen') && document.getElementById('wheelScreen').style.display === 'flex';
    if (wheelVisible) { if (typeof spinWheel === 'function') spinWheel(); }
    else { roll(); }
  }
});

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playRoll() {
  if (soundMuted) return;
  try {
    const ctx   = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now   = ctx.currentTime;
    const ticks = 6 + Math.floor(Math.random() * 4);
    for (let i = 0; i < ticks; i++) {
      const t   = now + i * 0.055;
      const sz  = ctx.sampleRate * 0.04;
      const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let j = 0; j < sz; j++) d[j] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource(); src.buffer = buf;
      const bp  = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 800 + Math.random() * 600; bp.Q.value = 1.2;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.52 - i * 0.04, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      src.connect(bp); bp.connect(g); g.connect(ctx.destination);
      src.start(t); src.stop(t + 0.07);
    }
    const osc = ctx.createOscillator();
    const gf  = ctx.createGain();
    const ft  = now + ticks * 0.055;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, ft);
    osc.frequency.exponentialRampToValueAtTime(60, ft + 0.12);
    gf.gain.setValueAtTime(0.3, ft);
    gf.gain.exponentialRampToValueAtTime(0.001, ft + 0.15);
    osc.connect(gf); gf.connect(ctx.destination);
    osc.start(ft); osc.stop(ft + 0.16);
  } catch(e) {}
}

function _rndColor(pool) {
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickColors(pool, count) {
  // Special distribution ONLY for 4 dice:
  // ~55% chance → exactly 2 same + 2 different  (e.g. R R B G)
  // ~30% chance → exactly 3 same + 1 different  (e.g. R R R B)
  // ~15% chance → all 4 different               (e.g. R B G Y)
  // Never → all 4 same
  if (count === 4 && pool.length >= 2) {
    const r = Math.random();
    let groups;
    if      (r < 0.55) groups = [2, 1, 1];  // %55 → 2 aynı + 2 farklı
    else if (r < 0.80) groups = [3, 1];      // %25 → 3 aynı + 1 farklı
    else if (r < 0.97) groups = [1, 1, 1, 1];// %17 → 4 farklı
    else               groups = [4];          // %3  → 4 aynı

    const usedIds = new Set();
    const result  = [];
    for (const n of groups) {
      let c, tries = 0;
      // For groups=[4] (all same), allow repeating the same color
      const mustBeUnique = groups.length > 1;
      do { c = _rndColor(pool); tries++; } while (mustBeUnique && usedIds.has(c.id) && tries < 30);
      usedIds.add(c.id);
      for (let k = 0; k < n; k++) result.push(c);
    }
    // shuffle so pairs aren't always at the start
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
  }
  // All other dice counts → fully random
  return Array.from({length: count}, () => _rndColor(pool));
}

function roll() {
  const pool = COLORS.filter(c => enabled.has(c.id));
  if (!pool.length) { warn('NO COLORS ACTIVE'); return; }
  rollBtn.classList.remove('rolling'); void rollBtn.offsetWidth; rollBtn.classList.add('rolling');
  area.innerHTML = '';
  playRoll();
  const colorSeq = pickColors(pool, diceCount);
  for (let i = 0; i < diceCount; i++) {
    const color = colorSeq[i];
    const r  = parseInt(color.hex.slice(1,3), 16);
    const g2 = parseInt(color.hex.slice(3,5), 16);
    const b2 = parseInt(color.hex.slice(5,7), 16);
    const wrap = document.createElement('div'); wrap.className = 'cr-dw';
    const die  = document.createElement('div'); die.className  = 'cr-die';
    die.style.borderColor = color.hex;
    die.style.boxShadow   = `0 0 13px rgba(${r},${g2},${b2},.7),0 0 28px rgba(${r},${g2},${b2},.3),inset 0 0 10px rgba(${r},${g2},${b2},.1)`;
    const idx = i;
    setTimeout(() => {
      die.classList.add('anim');
      die.addEventListener('animationend', () => die.classList.remove('anim'), { once: true });
    }, idx * 65);
    const tag = document.createElement('div'); tag.className = 'cr-dtag';
    tag.style.color      = color.hex;
    tag.style.textShadow = `0 0 7px ${color.hex}`;
    tag.textContent      = color.label;
    wrap.appendChild(die); wrap.appendChild(tag);
    area.appendChild(wrap);
  }
  const _diceHTML = `ROLLED <strong>${diceCount}</strong> DICE &nbsp;·&nbsp; POOL: <strong>${pool.map(c => c.label).join(' · ')}</strong>`;
  rBar.innerHTML = _diceHTML;

}

function buildWheel() {
  wheelGroup.innerHTML = '';
  const n = WHEEL_SLICES.length;
  const angleStep = 360 / n;
  const cx = 150, cy = 150, r = 145;

  WHEEL_SLICES.forEach((slice, i) => {
    const startAngle = i * angleStep;
    const endAngle   = startAngle + angleStep;
    const startRad = (startAngle - 90) * Math.PI / 180;
    const endRad   = (endAngle   - 90) * Math.PI / 180;
    const x1 = cx + r * Math.cos(startRad);
    const y1 = cy + r * Math.sin(startRad);
    const x2 = cx + r * Math.cos(endRad);
    const y2 = cy + r * Math.sin(endRad);

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`);
    path.setAttribute('fill', slice.color);
    path.setAttribute('fill-opacity', '0.85');
    path.setAttribute('stroke', '#000');
    path.setAttribute('stroke-width', '1.5');
    wheelGroup.appendChild(path);

    // label
    const midAngle = (startAngle + endAngle) / 2;
    const midRad = (midAngle - 90) * Math.PI / 180;
    const lx = cx + (r * 0.62) * Math.cos(midRad);
    const ly = cy + (r * 0.62) * Math.sin(midRad);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', lx);
    text.setAttribute('y', ly);
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', '22');
    text.setAttribute('font-weight', 'bold');
    text.setAttribute('font-family', "'Share Tech Mono', monospace");
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('transform', `rotate(${midAngle}, ${lx}, ${ly})`);
    text.textContent = slice.label;
    wheelGroup.appendChild(text);
  });
}


function playWheelSpin() {
  if (soundMuted) return;
  try {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const totalDuration = 4.0; // matches wheel CSS transition duration
    const tickCount = 28; // number of ticks across the spin
    for (let i = 0; i < tickCount; i++) {
      // ease-out spacing: ticks start fast, slow down toward the end
      const progress = i / tickCount;
      const eased = 1 - Math.pow(1 - progress, 2.2);
      const t = now + eased * totalDuration;

      const sz  = ctx.sampleRate * 0.018;
      const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
      const d   = buf.getChannelData(0);
      for (let j = 0; j < sz; j++) d[j] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource(); src.buffer = buf;
      const bp  = ctx.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 1400 + Math.random() * 300;
      bp.Q.value = 3;
      const g = ctx.createGain();
      const vol = 0.4 - progress * 0.18; // ticks get a bit softer near the end
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
      src.connect(bp); bp.connect(g); g.connect(ctx.destination);
      src.start(t); src.stop(t + 0.03);
    }

    // final "ding" chime when wheel stops
    const dingTime = now + totalDuration + 0.05;
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gDing = ctx.createGain();
    osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, dingTime);
    osc2.type = 'sine'; osc2.frequency.setValueAtTime(1320, dingTime);
    gDing.gain.setValueAtTime(0.0001, dingTime);
    gDing.gain.exponentialRampToValueAtTime(0.35, dingTime + 0.02);
    gDing.gain.exponentialRampToValueAtTime(0.001, dingTime + 0.9);
    osc1.connect(gDing); osc2.connect(gDing); gDing.connect(ctx.destination);
    osc1.start(dingTime); osc1.stop(dingTime + 0.95);
    osc2.start(dingTime); osc2.stop(dingTime + 0.95);
  } catch(e) {}
}

function spinWheel() {
  if (wheelSpinning) return;
  wheelSpinning = true;
  spinBtn.disabled = true;
  wheelResultBar.innerHTML = '&nbsp;';
  _lastWheelResultHTML = '&nbsp;';

  const n = WHEEL_SLICES.length;
  const angleStep = 360 / n;
  const winnerIndex = Math.floor(Math.random() * n);
  // Wheel must land so winnerIndex slice center is at top (pointer position)
  const targetSliceCenter = winnerIndex * angleStep + angleStep / 2;
  const extraSpins = 5 + Math.floor(Math.random() * 3); // 5-7 full turns
  const finalRotation = wheelRotation + extraSpins * 360 + (360 - targetSliceCenter) - (wheelRotation % 360);

  wheelRotation = finalRotation;
  wheelGroup.style.transform = `rotate(${wheelRotation}deg)`;

  playWheelSpin();

  setTimeout(() => {
    wheelSpinning = false;
    spinBtn.disabled = false;
    const winner = WHEEL_SLICES[winnerIndex];
    const _winColor = winner.label === 'W' ? '#00ff87' : '#ff003c';
    const _wheelHTML = `RESULT: <strong style="color:${_winColor};text-shadow:0 0 8px ${_winColor}">${winner.label === 'W' ? 'WIN' : 'LOSE'}</strong>`;
    wheelResultBar.innerHTML = _wheelHTML;
    _lastWheelResultHTML = _wheelHTML;
  }, 4100);
}

let onWheelScreen = false;

function showWheel() {
  diceScreen.style.display = 'none';
  wheelScreen.style.display = 'flex';
  settingsPanel.style.display = 'none';
  btnSettings.classList.remove('on');
  iconWheel.style.display = 'none';
  iconDice.style.display  = 'inline';
  wheelBtnLabel.textContent = 'DICE';
  document.getElementById('logoSuffix').textContent = 'WHEEL';
  onWheelScreen = true;
}

function showDice() {
  wheelScreen.style.display = 'none';
  diceScreen.style.display = 'flex';
  iconWheel.style.display = 'inline';
  iconDice.style.display  = 'none';
  wheelBtnLabel.textContent = 'WHEEL';
  document.getElementById('logoSuffix').textContent = 'DICE';
  onWheelScreen = false;
}

function toggleWheelDice() {
  onWheelScreen ? showDice() : showWheel();
}

btnWheel.addEventListener('click', toggleWheelDice);
spinBtn.addEventListener('click', spinWheel);

buildWheel();


/* ── Result Integrity Guard ── */
// Keeps a authoritative record of the last real result and
// re-applies it if the displayed text is altered via DevTools / DOM editing.
let _lastDiceResultHTML  = null;
let _lastWheelResultHTML = null;

function _protectElement(el, getAuthoritativeHTML) {
  if (!el) return;
  const observer = new MutationObserver(() => {
    const authoritative = getAuthoritativeHTML();
    if (authoritative !== null && el.innerHTML !== authoritative) {
      el.innerHTML = authoritative;
    }
  });
  observer.observe(el, { childList: true, characterData: true, subtree: true });
}

_protectElement(rBar,             () => _lastDiceResultHTML);
_protectElement(wheelResultBar,   () => _lastWheelResultHTML);

rollBtn.addEventListener('click', roll);

function warn(msg) {
  const el = document.createElement('div'); el.className = 'cr-warn';
  el.textContent = '[ ' + msg + ' ]';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}
